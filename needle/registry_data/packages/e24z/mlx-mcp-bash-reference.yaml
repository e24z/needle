{
  "schema": "needle.package.v1",
  "id": "e24z/mlx-mcp-bash-reference",
  "display_name": "MLX MCP Bash Reference",
  "implements": [
    "swe-pruner/reference"
  ],
  "host_binding": "mcp/bash",
  "uses": {
    "backend": "e24z/code-pruner-mlx"
  },
  "focus_contract": {
    "prompt_bundle": "mcp/bash-observation@0.1",
    "missing_focus_behavior": "passthrough_original"
  },
  "compute": {
    "default": "local_mlx",
    "alternatives": [
      "http_pruner"
    ]
  },
  "runtime": "local_manager",
  "runtime_profile": {
    "id": "local_mlx_adaptive",
    "env": {
      "NEEDLE_MLX_PROFILE": "local_adaptive",
      "NEEDLE_MLX_MAX_BATCH_SIZE": "1"
    }
  },
  "privacy": {
    "default": "local_only",
    "remote_requires_explicit_endpoint": true
  },
  "accounting": {
    "status": "exact_chars",
    "async": [
      "tokens_removed_est",
      "cost_equivalent_est"
    ]
  },
  "package_card": "package-cards/e24z/mlx-mcp-bash-reference",
  "claim_card": "claims/mlx-mcp-bash-reference",
  "evidence": [
    "fixture_pack:mlx-mcp-bash-reference"
  ]
}
