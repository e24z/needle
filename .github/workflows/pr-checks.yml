name: PR checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "push-1.0"

permissions:
  contents: read

jobs:
  test:
    name: Rust and worker tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check Rust workspace
        run: |
          cargo check
          cargo test

      - name: Compile Python sources
        run: PYTHONPATH=python python -m compileall python tests

      - name: Run worker tests
        run: |
          PYTHONPATH=python python tests/test_worker.py
          PYTHONPATH=python python tests/test_repair.py
          PYTHONPATH=python python tests/test_backends.py
          PYTHONPATH=python python tests/test_code_pruner_batching.py
          PYTHONPATH=python python tests/test_code_pruner_chunking.py
          PYTHONPATH=python python tests/test_code_pruner_profiling.py
          PYTHONPATH=python python tests/test_code_pruner_backbone.py
          PYTHONPATH=python python tests/test_model_download.py

      - name: Run Pi extension tests
        run: |
          node tests/test_pi_extension.mjs
          NEEDLE_BIN=target/debug/needle node tests/test_pi_client_daemon.mjs

      - name: Build release artifact
        run: bash scripts/package-release.sh --dist /tmp/needle-dist --python python
