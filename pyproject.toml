[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

# uv-native provisioning. Host adapters launch the model runtime with
# `uv run --extra mlx -m pruner ...`, while the public `needle` control plane
# stays lightweight enough to install without MLX.
[project]
name = "needle"
version = "0.1.0"
description = "Local context-pruning for agent coding tools."
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
mlx = [
    "mlx",
    "mlx-lm",
    "numpy",
    "huggingface-hub",
    "transformers",
]

[project.scripts]
needle = "needle.cli:main"

[tool.setuptools.packages.find]
include = ["needle*", "pruner*"]
